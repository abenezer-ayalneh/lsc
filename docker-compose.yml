name: lsc-wordpress

services:
  db:
    image: mariadb:11
    container_name: lsc_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [lsc]

  wordpress:
    image: wordpress:php8.2-apache
    container_name: lsc_wordpress
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${WP_PORT}:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DEBUG: "1"
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', getenv('WP_SITE_URL') ?: 'http://localhost:8080');
        define('WP_SITEURL', getenv('WP_SITE_URL') ?: 'http://localhost:8080');
        define('WP_ENVIRONMENT_TYPE', 'local');
      WP_SITE_URL: ${WP_SITE_URL}
    volumes:
      - ./wordpress:/var/www/html
      - ./config/mu-plugins:/var/www/html/wp-content/mu-plugins
    networks: [lsc]

  # Runs once on `up` to install WordPress + Kadence, then exits.
  wpcli:
    image: wordpress:cli-php8.2
    container_name: lsc_wpcli
    user: "33:33"
    depends_on:
      db:
        condition: service_healthy
      wordpress:
        condition: service_started
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WP_SITE_URL: ${WP_SITE_URL}
      WP_SITE_TITLE: ${WP_SITE_TITLE}
      WP_ADMIN_USER: ${WP_ADMIN_USER}
      WP_ADMIN_PASSWORD: ${WP_ADMIN_PASSWORD}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL}
    volumes:
      - ./wordpress:/var/www/html
      - ./config/setup.sh:/setup.sh:ro
    entrypoint: ["/bin/sh", "/setup.sh"]
    networks: [lsc]

  phpmyadmin:
    image: phpmyadmin:5
    container_name: lsc_phpmyadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${PHPMYADMIN_PORT}:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    networks: [lsc]

  mailhog:
    image: mailhog/mailhog:latest
    container_name: lsc_mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_UI_PORT}:8025"  # web UI
      # SMTP (1025) stays on the internal network; WordPress reaches it at mailhog:1025
    networks: [lsc]

volumes:
  db_data:

networks:
  lsc:
    driver: bridge
